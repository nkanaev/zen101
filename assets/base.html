<!DOCTYPE html>
<html lang="{{ .Lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <link rel="icon" href="{{ .Root }}/favicon.ico">
    <link rel="stylesheet" href="{{ .Root }}/styles.css">
</head>
<body>
{{ if eq .Page "toc" }}
    <h1>{{ .Title }}</h1>
    <ul>
    {{ range .Stories }}
        <li><a href="{{ .Href }}">{{ .Title }}</a></li>
    {{ end }}
    </ul>
{{ else if eq .Page "index" }}
    <ul>
    {{ range .Langs }}
        <li><a href="{{ $.Root }}/{{ .Code }}/">{{ .Name }}</a></li>
    {{ end }}
    </ul>
{{ else if eq .Page "story" }}
    {{ .Body }}
    <nav>
    {{ if .Prev }}
        <a href="{{ .Prev }}"><img src="{{ .Root }}/chevron-left.svg" alt="prev"></a>
    {{ end }}
        <a href="./../"><img src="{{ .Root }}/list.svg" alt="toc"></a>
    {{ if .Next }}
        <a href="{{ .Next }}"><img src="{{ .Root }}/chevron-right.svg" alt="next"></a>
    {{ end }}
    </nav>
{{ end }}
</body>
</html>
